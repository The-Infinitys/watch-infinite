<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg
    width="50"
    height="450"
    viewBox="0 0 50 450"
    version="1.1"
    id="svg1"
    sodipodi:docname="XrossInfinite.svg"
    inkscape:version="1.4.3 (0d15f75042, 2025-12-25)"
    xmlns:inkscape="http://www.inkscape.org/namespaces/inkscape"
    xmlns:sodipodi="http://sodipodi.sourceforge.net/DTD/sodipodi-0.dtd"
    xmlns="http://www.w3.org/2000/svg"
    xmlns:svg="http://www.w3.org/2000/svg"
>
    <defs id="defs1">
        <linearGradient id="prismGradient" x1="0%" y1="0%" x2="0%" y2="100%">
            <stop offset="0%" stop-color="#ff0000" />
            <stop offset="20%" stop-color="#ffff00" />
            <stop offset="40%" stop-color="#00ff00" />
            <stop offset="60%" stop-color="#00ffff" />
            <stop offset="80%" stop-color="#0000ff" />
            <stop offset="100%" stop-color="#ff00ff" />
        </linearGradient>
        <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
            <!-- ① 芯を作るための細く濃い光 -->
            <feGaussianBlur stdDeviation="1" result="blur1" />
            <!-- ② 周囲に広がる鮮やかな光 -->
            <feGaussianBlur stdDeviation="3" result="blur2" />

            <!-- 光を何重にもブレンドして密度（くっきり感）を爆上げする -->
            <feMerge>
                <feMergeNode in="blur2" />
                <feMergeNode in="blur1" />
                <feMergeNode in="blur1" />
                <!-- 2回重ねて濃くする -->
                <feMergeNode in="SourceGraphic" />
            </feMerge>
        </filter>
    </defs>
    <path
        style="
            baseline-shift: baseline;
            display: inline;
            overflow: visible;
            vector-effect: none;
            enable-background: accumulate;
            stop-color: #000000;
            stop-opacity: 1;
            opacity: 1;
            filter: url(#glow);
        "
        fill="url(#prismGradient)"
        d="M 25,95 l -4,11.3 l -8,115.87 l 0,9.89 l 6,4.24 l 12,0 l 6,-4.24 l 0,-9.89 l -8,-115.87 l -4,-11.3 z M 18,225 a 7,7 0 1,1 14,0 a 7,7 0 1,1 -14,0 z M 25,99.52 l 2,6.78 l -2,11.3 l -2,-11.3 l 2,-6.78 z M 23,113.65 l 2,11.3 l 2,-11.3 l 6,96.09 l -4,2.83 l -8,0 l -4,-2.83 z"
        id="path2"
    />
    <path
        style="
            baseline-shift: baseline;
            display: inline;
            overflow: visible;
            vector-effect: none;
            enable-background: accumulate;
            stop-color: #000000;
            stop-opacity: 1;
            opacity: 1;
        "
        d="
M 25,95 l -4,11.3 l -8,115.87 l 0,9.89 l 6,4.24 l 12,0 l 6,-4.24 l 0,-9.89 l -8,-115.87 l -4,-11.3 z M 18,225 a 7,7 0 1,1 14,0 a 7,7 0 1,1 -14,0 z M 25,99.52 l 2,6.78 l -2,11.3 l -2,-11.3 l 2,-6.78 z M 23,113.65 l 2,11.3 l 2,-11.3 l 6,96.09 l -4,2.83 l -8,0 l -4,-2.83 z"
        fill-rule="evenodd"
        fill="#ffffff"
        id="path1"
    />
</svg>
